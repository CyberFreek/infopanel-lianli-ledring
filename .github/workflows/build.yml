name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet build InfoPanel.LianLiLedRing/InfoPanel.LianLiLedRing.csproj -c Release

      - name: Stage plugin folder
        shell: pwsh
        run: |
          $out = "InfoPanel.LianLiLedRing/bin/Release/net8.0-windows"
          $stage = "dist/InfoPanel.LianLiLedRing"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "$out/*" $stage -Recurse -Force -Exclude *.pdb
          Compress-Archive -Path $stage -DestinationPath dist/InfoPanel.LianLiLedRing.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: InfoPanel.LianLiLedRing
          path: dist/InfoPanel.LianLiLedRing.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/InfoPanel.LianLiLedRing.zip
